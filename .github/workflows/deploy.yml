name: Deploy to LL

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'deploy.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via GroundControl
        run: |
          curl -sf -X POST https://control.lucianlabs.ca/deploy \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.GC_API_KEY }}" \
            -d '{"repo": "lucian-labs/yama-bruh"}'
