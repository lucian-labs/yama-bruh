<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAMA-BRUH — FM Ringtone Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- GLSL background canvas -->
  <canvas id="bg-canvas"></canvas>

  <div id="app">
    <!-- Air vents -->
    <div class="air-vents">
      <div class="vent-slat"></div>
      <div class="vent-slat"></div>
      <div class="vent-slat"></div>
      <div class="vent-slat"></div>
      <div class="vent-slat"></div>
      <div class="vent-slat"></div>
      <div class="vent-slat"></div>
      <div class="vent-slat"></div>
    </div>

    <!-- Header plate -->
    <div class="plate-header">
      <div class="brand-group">
        <div class="brand">YAMA-BRUH</div>
        <div class="brand-sub">PortaSound</div>
      </div>
      <div class="model-text">YB-99FM</div>
    </div>

    <!-- Voice Bank -->
    <div class="voice-bank-panel">
      <div class="panel-label">VOICE BANK</div>
      <div class="voice-bank-grid" id="voice-bank-grid">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Controls: Display + Voice Selector -->
    <div class="controls-row">
      <div class="display-unit">
        <div class="display-label">VOICE / TEMPO</div>
        <div class="seg-housing">
          <div class="seg-digits" id="seg-digits">00</div>
        </div>
        <div class="preset-readout" id="preset-readout">Grand Piano</div>
        <div class="display-status" id="lcd-info">READY</div>
      </div>

      <div class="voice-selector">
        <div class="panel-label">VOICE SELECTOR</div>
        <div class="selector-grid" id="selector-grid">
          <div class="sel-col">
            <span class="sel-label">5</span><button class="sel-btn" data-num="5"></button>
            <span class="sel-label">6</span><button class="sel-btn" data-num="6"></button>
            <span class="sel-label">7</span><button class="sel-btn" data-num="7"></button>
            <span class="sel-label">8</span><button class="sel-btn" data-num="8"></button>
            <span class="sel-label">9</span><button class="sel-btn" data-num="9"></button>
          </div>
          <div class="sel-col">
            <span class="sel-label">0</span><button class="sel-btn" data-num="0"></button>
            <span class="sel-label">1</span><button class="sel-btn" data-num="1"></button>
            <span class="sel-label">2</span><button class="sel-btn" data-num="2"></button>
            <span class="sel-label">3</span><button class="sel-btn" data-num="3"></button>
            <span class="sel-label">4</span><button class="sel-btn" data-num="4"></button>
          </div>
        </div>
      </div>
    </div>

    <!-- Effect Switches (PSS-470 style) -->
    <div class="effects-row">
      <button class="fx-btn" id="fx-sustain">SUSTAIN</button>
      <button class="fx-btn" id="fx-vibrato">VIBRATO</button>
      <button class="fx-btn" id="fx-portamento">PORTAMENTO</button>
    </div>

    <!-- Rhythm Section -->
    <div class="rhythm-section">
      <div class="panel-label">RHYTHM</div>
      <div class="rhythm-controls">
        <div class="rhythm-selector">
          <button class="rhythm-btn" id="rhythm-prev">&lt;</button>
          <div class="rhythm-display" id="rhythm-display">01 8 Beat</div>
          <button class="rhythm-btn" id="rhythm-next">&gt;</button>
        </div>
        <div class="rhythm-transport">
          <button class="rhythm-btn transport-btn" id="rhythm-start">START</button>
          <button class="rhythm-btn transport-btn" id="rhythm-fill">FILL</button>
        </div>
        <div class="rhythm-tempo">
          <button class="rhythm-btn tempo-btn" id="tempo-down">&minus;</button>
          <div class="tempo-display" id="tempo-display">120</div>
          <button class="rhythm-btn tempo-btn" id="tempo-up">&plus;</button>
          <span class="tempo-label">BPM</span>
        </div>
      </div>
      <div class="rhythm-steps" id="rhythm-steps">
        <span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span>
        <span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span>
        <span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span>
        <span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span>
      </div>
    </div>

    <!-- Ringtone IDs -->
    <div class="id-section">
      <div class="panel-label">RANDOM IDs</div>
      <div id="random-ids" class="id-list"></div>
      <div class="panel-label">CUSTOM IDs</div>
      <div id="custom-ids" class="id-list"></div>
    </div>

    <!-- MIDI controls + Piano keyboard -->
    <div class="keyboard-section">
      <div class="midi-row">
        <button id="midi-btn" class="midi-btn">MIDI: OFF</button>
        <select id="midi-select" class="midi-select" disabled>
          <option value="">-- no devices --</option>
        </select>
      </div>
      <div class="keyboard" id="keyboard"></div>
    </div>

    <!-- Editor Section (collapsible) -->
    <div class="tweak-section">
      <button class="tweak-toggle" id="tweak-toggle">EDITOR &#9660;</button>
      <div class="tweak-body" id="tweak-body">
        <!-- Sound subsection -->
        <div class="editor-subtitle">SOUND</div>
        <div class="tweak-grid">
          <div class="tweak-param">
            <label>CARRIER</label>
            <input type="range" min="0.1" max="4" step="0.01" id="tw-carrier">
            <span class="tw-val" id="tw-carrier-val">1.00</span>
          </div>
          <div class="tweak-param">
            <label>MOD RATIO</label>
            <input type="range" min="0.1" max="16" step="0.01" id="tw-modratio">
            <span class="tw-val" id="tw-modratio-val">1.00</span>
          </div>
          <div class="tweak-param">
            <label>MOD INDEX</label>
            <input type="range" min="0" max="16" step="0.01" id="tw-modindex">
            <span class="tw-val" id="tw-modindex-val">2.00</span>
          </div>
          <div class="tweak-param">
            <label>ATTACK</label>
            <input type="range" min="0.001" max="2" step="0.001" id="tw-attack">
            <span class="tw-val" id="tw-attack-val">0.01</span>
          </div>
          <div class="tweak-param">
            <label>DECAY</label>
            <input type="range" min="0.01" max="4" step="0.01" id="tw-decay">
            <span class="tw-val" id="tw-decay-val">0.30</span>
          </div>
          <div class="tweak-param">
            <label>SUSTAIN</label>
            <input type="range" min="0" max="1" step="0.01" id="tw-sustain">
            <span class="tw-val" id="tw-sustain-val">0.30</span>
          </div>
          <div class="tweak-param">
            <label>RELEASE</label>
            <input type="range" min="0.01" max="5" step="0.01" id="tw-release">
            <span class="tw-val" id="tw-release-val">0.20</span>
          </div>
          <div class="tweak-param">
            <label>FEEDBACK</label>
            <input type="range" min="0" max="1" step="0.01" id="tw-feedback">
            <span class="tw-val" id="tw-feedback-val">0.00</span>
          </div>
        </div>
        <button class="tweak-reset" id="tweak-reset">RESET TO PRESET</button>

        <!-- MIDI Channel Mapping subsection -->
        <div class="editor-subtitle midi-subtitle">MIDI CHANNELS</div>
        <div class="ch-grid" id="ch-grid">
          <!-- 16 channel buttons generated by JS -->
        </div>
      </div>
    </div>

    <!-- Visual Config (collapsible) -->
    <div class="tweak-section">
      <button class="tweak-toggle" id="visual-toggle">VISUAL CONFIG &#9660;</button>
      <div class="tweak-body" id="visual-body">
        <div class="tweak-grid">
          <div class="tweak-param">
            <label>DUST</label>
            <input type="range" min="0" max="1" step="0.01" id="vis-dust">
            <span class="tw-val" id="vis-dust-val">0.50</span>
          </div>
          <div class="tweak-param">
            <label>WEAR</label>
            <input type="range" min="0" max="1" step="0.01" id="vis-wear">
            <span class="tw-val" id="vis-wear-val">0.50</span>
          </div>
          <div class="tweak-param">
            <label>PATINA</label>
            <input type="range" min="0" max="1" step="0.01" id="vis-patina">
            <span class="tw-val" id="vis-patina-val">0.30</span>
          </div>
          <div class="tweak-param">
            <label>LIGHT</label>
            <input type="range" min="0" max="1" step="0.01" id="vis-light">
            <span class="tw-val" id="vis-light-val">0.70</span>
          </div>
          <div class="tweak-param">
            <label>GRAIN</label>
            <input type="range" min="0" max="1" step="0.01" id="vis-grain">
            <span class="tw-val" id="vis-grain-val">0.50</span>
          </div>
          <div class="tweak-param">
            <label>SCRATCHES</label>
            <input type="range" min="0" max="1" step="0.01" id="vis-scratches">
            <span class="tw-val" id="vis-scratches-val">0.50</span>
          </div>
          <div class="tweak-param vis-tod-param">
            <label>TIME OF DAY</label>
            <div class="tod-controls">
              <button class="tod-mode-btn" id="tod-mode-btn">AUTO</button>
              <input type="range" min="0" max="24" step="0.1" id="vis-tod" disabled>
            </div>
            <span class="tw-val" id="vis-tod-val">auto</span>
          </div>
        </div>
        <button class="tweak-reset" id="visual-reset">RESET DEFAULTS</button>
      </div>
    </div>
  </div>

  <script src="synth.js"></script>
  <script src="drums.js"></script>
  <script src="midi.js"></script>
  <script src="app.js"></script>
</body>
</html>
